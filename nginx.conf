# Nginx конфигурация для сайта "Yuki Shop"
# Путь: /etc/nginx/sites-available/ne-grusti
# Симлинк: sudo ln -s /etc/nginx/sites-available/ne-grusti /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    server_name xo1337.duckdns.org;

    # Перенаправление на HTTPS (раскомментировать после настройки SSL)
    # return 301 https://$host$request_uri;

    # Включаем gzip-сжатие для ускорения загрузки
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # Проксирование на Node.js
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Таймауты
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Статические файлы - без кэширования для избежания проблем
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Запрет кэширования
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # Ограничение размера запроса (защита от больших тел)
    client_max_body_size 1m;

    # Логи
    access_log /var/log/nginx/ne-grusti.access.log;
    error_log /var/log/nginx/ne-grusti.error.log;
}

